<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hr47here</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px;
background:rgba(0,0,0,.9);
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.logo{
color:red;
font-size:32px;
font-weight:bold;
letter-spacing:2px;
}

.hero{
height:80vh;
background:linear-gradient(to top,#111,transparent),
url("https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?w=1600");
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:60px;
}

.hero h1{
font-size:60px;
}

.hero p{
font-size:20px;
margin-top:10px;
max-width:500px;
}

.watch{
display:inline-block;
margin-top:20px;
padding:15px 35px;
background:red;
color:white;
text-decoration:none;
border-radius:6px;
font-size:20px;
}

.section{
padding:30px;
}

.section h2{
margin-bottom:20px;
}

.row{
display:flex;
overflow-x:auto;
gap:20px;
padding-bottom:20px;
}

.card{
min-width:280px;
height:160px;
background:#222;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.08);
background:red;
}

footer{
text-align:center;
padding:30px;
color:gray;
}
</style>

</head>
<body>

<header>
<div class="logo">hr47here</div>
</header>

<section class="hero">
<div>
<h1>Welcome</h1>
<p>Watch my latest videos.</p>
<a class="watch" href="#">▶ Play</a>
</div>
</section>

<div class="section">
<h2>Latest Videos</h2>

<div class="row">

<div class="card"><h2>Latest Video</h2>

<iframe
src="https://drive.google.com/file/d/1DJQU_e4Xh7DD2a9PR4om7wqLu03L9fJn/preview"
width="100%"
height="600"
allow="autoplay"
allowfullscreen
style="border:none;border-radius:10px;">
</iframe></div>

<div class="card">Video 2</div>

<div class="card">Video 3</div>

<div class="card">Video 4</div>

<div class="card">Video 5</div>

</div>
</div>

<footer>
© 2026 hr47here
</footer>

</body>
</html>
